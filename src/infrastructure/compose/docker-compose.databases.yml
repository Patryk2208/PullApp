services:
  trip-planner-db:
    image: postgis/postgis:17-3.5-alpine
    container_name: trip-planner-db
    environment:
      POSTGRES_DB: ${TRIP_PLANNER_POSTGRES_DB}
      POSTGRES_USER: ${TRIP_PLANNER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${TRIP_PLANNER_POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - trip-planner-data:/var/lib/postgresql/data
    networks:
      - pullapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TRIP_PLANNER_POSTGRES_USER} -d ${TRIP_PLANNER_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  accounts-db:
    image: postgres:17-alpine
    container_name: accounts-db
    environment:
      POSTGRES_USER: ${ACCOUNTS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${ACCOUNTS_POSTGRES_PASSWORD}
      POSTGRES_DB: ${ACCOUNTS_POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - accounts-data:/var/lib/postgresql/data
    networks:
      - pullapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ACCOUNTS_POSTGRES_USER} -d ${ACCOUNTS_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  notifications-db:
    image: postgres:17-alpine
    container_name: notifications-db
    environment:
      POSTGRES_USER: ${NOTIFICATIONS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${NOTIFICATIONS_POSTGRES_PASSWORD}
      POSTGRES_DB: ${NOTIFICATIONS_POSTGRES_DB}
    ports:
      - "5435:5432"
    volumes:
      - notifications-data:/var/lib/postgresql/data
    networks:
      - pullapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NOTIFICATIONS_POSTGRES_USER} -d ${NOTIFICATIONS_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  chat-db:
    image: mongo:8-noble
    container_name: chat-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${CHAT_MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${CHAT_MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${CHAT_MONGO_DB}
    ports:
      - "27017:27017"
    volumes:
      - chat-db-data:/data/db
    networks:
      - pullapp-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  queue-setup:
    build:
      context: ../services/route-calc
      dockerfile: Dockerfile.test
    container_name: queue-setup
    depends_on:
      compute-queue:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: compute-queue
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
    networks:
      - pullapp-network
    command: python tests/purge_queues.py
    profiles:
      - e2e

  route-calc:
    build:
      context: ../services/route-calc
      dockerfile: Dockerfile
    container_name: route-calc
    depends_on:
      compute-queue:
        condition: service_healthy
      queue-setup:
        condition: service_completed_successfully
    environment:
      COMPUTE_QUEUE_PASSWORD: ${RABBITMQ_PASS}
      ROUTE_CALC_SLOW_ALGORITHM_SECONDS: "0"
      ROUTE_CALC_MOCK_FAILURE_PROBABILITY: "0"
    networks:
      - pullapp-network
    healthcheck:
      test: ["CMD", "python", "-c", "from route_calc.algorithms import distance_km, Point; distance_km(Point(0,0), Point(0,1))"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 60s
    profiles:
      - e2e

  route-calc-tests:
    build:
      context: ../services/route-calc
      dockerfile: Dockerfile.test
    container_name: route-calc-tests
    depends_on:
      compute-queue:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: compute-queue
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
    volumes:
      - ../services/route-calc:/app
    networks:
      - pullapp-network
    command: pytest tests/rabbitmq_integration_test.py -v
    profiles:
      - tests

  route-calc-e2e-tests:
    build:
      context: ../services/route-calc
      dockerfile: Dockerfile.test
    container_name: route-calc-e2e-tests
    depends_on:
      compute-queue:
        condition: service_healthy
      route-calc:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: compute-queue
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
    volumes:
      - ../services/route-calc:/app
    networks:
      - pullapp-network
    command: pytest tests/rabbitmq_e2e_test.py -v
    profiles:
      - e2e

networks:
  pullapp-network:
    driver: bridge

volumes:
  trip-planner-data:
  accounts-data:
  redis-data:
  rabbitmq-data:
