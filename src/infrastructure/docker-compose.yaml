services:
  trip-planner-db:
    image: postgis/postgis:17-3.5-alpine
    container_name: trip-planner-db
    environment:
      POSTGRES_DB: ${TRIP_PLANNER_POSTGRES_DB}
      POSTGRES_USER: ${TRIP_PLANNER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${TRIP_PLANNER_POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - trip-planner-data:/var/lib/postgresql/data
      #- ./init-scripts:/docker-entrypoint-initdb.d #???
    networks:
      - pullapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TRIP_PLANNER_POSTGRES_USER} -d ${TRIP_PLANNER_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  accounts-db:
    image: postgres:17-alpine
    container_name: accounts-db
    environment:
      POSTGRES_USER: ${ACCOUNTS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${ACCOUNTS_POSTGRES_PASSWORD}
      POSTGRES_DB: ${ACCOUNTS_POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - accounts-data:/var/lib/postgresql/data
    networks:
      - pullapp-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${ACCOUNTS_POSTGRES_USER} -d ${ACCOUNTS_POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:8-alpine
    container_name: cache
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - ./cache/redis.conf:/usr/local/etc/redis/redis.conf
      - redis-data:/data
    networks:
      - pullapp-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  compute-queue:
    image: rabbitmq:4.2-management-alpine
    container_name: compute-queue
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      RABBITMQ_DEFAULT_VHOST: /
      RABBITMQ_PLUGINS: "rabbitmq_management rabbitmq_prometheus"
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - ./compute-queue/definitions.json:/etc/rabbitmq/definitions.json
      #- ./compute-queue/enabled_plugins:/etc/rabbitmq/enabled_plugins
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - pullapp-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  event-bus:
    image: apache/kafka:3.9.0
    container_name: event-bus
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://event-bus:9092,CONTROLLER://event-bus:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@event-bus:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - event-bus-data:/var/lib/kafka/data
    networks:
      - pullapp-network
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5


networks:
  pullapp-network:
    driver: bridge

volumes:
  trip-planner-data:
  accounts-data:
  redis-data:
  rabbitmq-data:
  event-bus-data: