apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pullapp

resources:
  - namespace.yaml
  - services/trip-planner/deployment.yaml
  - services/trip-planner/service.yaml
  - services/route-calc/deployment.yaml
  - services/route-calc/service.yaml
  - services/route-calc/trigger-auth.yaml
  - services/route-calc/scaled-object.yaml
  - services/accounts/deployment.yaml
  - services/accounts/service.yaml
  - services/gateway/deployment.yaml
  - services/gateway/service.yaml
  - services/driver-tracker/deployment.yaml
  - services/driver-tracker/service.yaml
  - services/notifications/deployment.yaml
  - services/notifications/service.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: pullapp

images:
  - name: trip-planner
    newName: pullapp/trip-planner
  - name: route-calc
    newName: pullapp/route-calc
  - name: accounts
    newName: pullapp/accounts
  - name: gateway
    newName: pullapp/gateway
  - name: driver-tracker
    newName: pullapp/driver-tracker
  - name: notifications
    newName: pullapp/notifications

configMapGenerator:
- name: trip-planner-config
  files:
  - services/trip-planner/appsettings.json
- name: route-calc-config
  files:
  - services/route-calc/config.json
- name: gateway-config
  files:
  - services/gateway/appsettings.json

secretGenerator:
- name: pullapp-secrets
  literals:
  - TRIP_PLANNER_DB_PASSWORD=PLACEHOLDER
  - ACCOUNTS_DB_PASSWORD=PLACEHOLDER
  - ACCOUNTS_JWT_SECRET=PLACEHOLDER
  - ACCOUNTS_JWT_ISSUER=PLACEHOLDER
  - ACCOUNTS_JWT_AUDIENCE=PLACEHOLDER
  - CACHE_PASSWORD=PLACEHOLDER
  - COMPUTE_QUEUE_PASSWORD=PLACEHOLDER
  - COMPUTE_QUEUE_SCALING_URL=PLACEHOLDER
  - DRIVER_TRACKER_REDIS_PASSWORD=PLACEHOLDER
  - NOTIFICATIONS_POSTGRES_URL=PLACEHOLDER
  - FIREBASE_PROJECT_ID=PLACEHOLDER
  options:
    disableNameSuffixHash: true
- name: firebase-credentials
  literals:
  - firebase.json=PLACEHOLDER
  options:
    disableNameSuffixHash: true