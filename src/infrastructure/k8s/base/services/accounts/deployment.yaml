apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounts
  labels:
    app: accounts
    tier: data
    component: user-management
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: accounts
  template:
    metadata:
      labels:
        app: accounts
        version: v1
    spec:
      containers:
      - name: app
        image: accounts:latest
        imagePullPolicy: IfNotPresent
        
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        
        env:
        - name: ConnectionStrings__AccountsDb
          valueFrom:
            configMapKeyRef:
              name: accounts-config
              key: ACCOUNTS_DB_CONNECTION
        
        - name: ConnectionStrings__Redis
          valueFrom:
            configMapKeyRef:
              name: accounts-config
              key: REDIS_CONNECTION
        
        - name: ASPNETCORE_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: accounts-config
              key: ASPNETCORE_ENVIRONMENT
        
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        
        - name: JWT__ISSUER
          valueFrom:
            configMapKeyRef:
              name: accounts-config
              key: JWT_ISSUER
        
        - name: JWT__AUDIENCE
          valueFrom:
            configMapKeyRef:
              name: accounts-config
              key: JWT_AUDIENCE
        
        # Secrets (from Secret, not ConfigMap)
        - name: JWT__SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: accounts-secrets
              key: jwt-secret-key
        
        - name: SMTP__PASSWORD
          valueFrom:
            secretKeyRef:
              name: accounts-secrets
              key: smtp-password
        
        # Probes
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      
      terminationGracePeriodSeconds: 30