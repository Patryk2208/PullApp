apiVersion: apps/v1
kind: Deployment
metadata:
  name: driver-tracker
  labels:
    app: driver-tracker
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: driver-tracker
  template:
    metadata:
      labels:
        app: driver-tracker
        version: v1
    spec:
      containers:
      - name: app
        image: driver-tracker
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8080
          name: http
          protocol: TCP

        env:
        - name: HTTP_ADDR
          value: ":8080"
        - name: REDIS_ADDR
          value: "driver-tracker-cache:6380"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pullapp-secrets
              key: DRIVER_TRACKER_REDIS_PASSWORD
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4317
        - name: OTEL_SERVICE_NAME
          value: driver-tracker

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"

      terminationGracePeriodSeconds: 15