apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: route-calc-scaler
  labels:
    app: route-calc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: route-calc
  
  minReplicaCount: 1
  maxReplicaCount: 20
  pollingInterval: 10
  cooldownPeriod: 60
  
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 120
          policies:
          - type: Pods
            value: 2
            periodSeconds: 60
          - type: Percent
            value: 50
            periodSeconds: 60
          selectPolicy: Min
  
  triggers:
  # Primary: Queue depth
  - type: rabbitmq
    metadata:
      queueName: compute-requests
      hostFromEnv: RABBITMQ_HOST
      queueLength: "10"
      mode: QueueLength
  
  # Secondary: CPU protection
  - type: cpu
    metadata:
      type: Utilization
      value: "70"