apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: route-calc-scaler
  labels:
    app: route-calc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: route-calc
  
  # Scaling bounds
  minReplicaCount: 1   # Keep 1 warm pod
  maxReplicaCount: 20  # Budget limit
  
  # How often to check queue
  pollingInterval: 10   # seconds
  cooldownPeriod: 60    # seconds before scaling down
  
  # Advanced scaling behavior
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 120
          policies:
          - type: Pods
            value: 2
            periodSeconds: 60
          - type: Percent
            value: 50
            periodSeconds: 60
          selectPolicy: Min
  
  triggers:
  # Primary: RabbitMQ queue depth
  - type: rabbitmq
    metadata:
      queueName: compute-requests
      hostFromEnv: RABBITMQ_HOST
      queueLength: "10"
      mode: QueueLength
    # No authentication for local development
  
  # Secondary: CPU utilization
  - type: cpu
    metadata:
      type: Utilization
      value: "70"
  
  # Future: Memory usage (commented for now)
  # - type: memory
  #   metadata:
  #     type: Utilization
  #     value: "80"