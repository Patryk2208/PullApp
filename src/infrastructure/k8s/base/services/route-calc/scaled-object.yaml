apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: route-calc-scaler
  labels:
    app: route-calc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: route-calc
  
  minReplicaCount: 1
  maxReplicaCount: 20
  pollingInterval: 10
  cooldownPeriod: 60          # only applies to scale-to-zero; min=1 so it's a no-op here

  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          # DEMO settings: scale back to 1 almost immediately after a load test so
          # KEDA scaling is easy to watch end-to-end.
          # PROD: this is too twitchy. Bump stabilizationWindowSeconds back to
          # 120-300s and use a gentle policy (e.g. Pods 2 / 60s, selectPolicy Min)
          # to avoid flapping and repeated route-calc cold starts (each replica
          # reloads the ~2 GiB OSRM graph on boot).
          stabilizationWindowSeconds: 15
          policies:
          - type: Percent
            value: 100
            periodSeconds: 15
          selectPolicy: Max
  
  triggers:
  # Primary: Queue depth
  - type: rabbitmq
    authenticationRef:
      name: compute-queue-auth
    metadata:
      queueName: compute-queue
      mode: QueueLength
      value: "10"
  
  # Secondary: CPU protection.
  # REQUIRES metrics-server in the cluster (minikube: `minikube addons enable
  # metrics-server`). Without it this trigger errors, the HPA goes
  # ScalingActive=False and then refuses ALL scaling decisions — including
  # scale-down — so route-calc gets stuck at whatever replica count it last hit.
  - type: cpu
    metricType: Utilization
    metadata:
      value: "70"
