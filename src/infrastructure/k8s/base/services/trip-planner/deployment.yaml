apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-planner
  labels:
    app: trip-planner
    tier: core
    component: orchestrator
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero downtime
  selector:
    matchLabels:
      app: trip-planner
  template:
    metadata:
      labels:
        app: trip-planner
        version: v1
    spec:
      containers:
      - name: app
        image: trip-planner:latest  # Image name, tag from kustomize
        imagePullPolicy: IfNotPresent  # :latest needs this
        
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        
        env:
        # Database connections
        - name: ConnectionStrings__TripDb
          valueFrom:
            configMapKeyRef:
              name: trip-planner-config
              key: TRIP_DB_CONNECTION
        
        - name: ConnectionStrings__Redis
          valueFrom:
            configMapKeyRef:
              name: trip-planner-config
              key: REDIS_CONNECTION
        
        # RabbitMQ
        - name: RabbitMQ__Host
          valueFrom:
            configMapKeyRef:
              name: trip-planner-config
              key: RABBITMQ_HOST
        
        - name: RabbitMQ__ComputeQueue
          value: "compute-requests"
        
        - name: RabbitMQ__ResultsQueue
          value: "compute-results"
        
        # Kafka
        - name: Kafka__BootstrapServers
          valueFrom:
            configMapKeyRef:
              name: trip-planner-config
              key: KAFKA_BOOTSTRAP
        
        # Service discovery
        - name: SERVICES__ACCOUNTS_URL
          value: "http://accounts:80"
        
        - name: SERVICES__PAYMENTS_URL
          value: "http://payments:80"  # Future service
        
        # ASP.NET Core specific
        - name: ASPNETCORE_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: trip-planner-config
              key: ASPNETCORE_ENVIRONMENT
        
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        
        # Probes
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        startupProbe:
          httpGet:
            path: /health/startup
            port: 8080
          failureThreshold: 30
          periodSeconds: 2
        
        # Resources
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        
        # Volume mounts for config
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
      
      volumes:
      - name: config
        configMap:
          name: trip-planner-config
      
      # Graceful shutdown
      terminationGracePeriodSeconds: 30