apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- state.yaml

secretGenerator:
- behavior: replace
  envs:
  - secrets/secrets.env
  name: pullapp-secrets
  options:
    disableNameSuffixHash: true
# TODO: replace secrets/firebase.json with a real Firebase service account JSON before testing push notifications
# (Firebase Console → Project Settings → Service Accounts → Generate new private key)
- behavior: replace
  name: firebase-credentials
  files:
  - firebase.json=secrets/firebase.json
  options:
    disableNameSuffixHash: true
  
patches:
- path: patches/probes.yaml
  target:
    group: apps
    kind: Deployment
    name: trip-planner
    version: v1
- path: patches/probes.yaml
  target:
    group: apps
    kind: Deployment
    name: accounts
    version: v1
- path: patches/probes.yaml
  target:
    group: apps
    kind: Deployment
    name: route-calc
    version: v1
- path: patches/probes.yaml
  target:
    group: apps
    kind: Deployment
    name: gateway
    version: v1
- path: patches/probes.yaml
  target:
    group: apps
    kind: Deployment
    name: driver-tracker
    version: v1
- path: patches/probes.yaml
  target:
    group: apps
    kind: Deployment
    name: notifications
    version: v1
- path: patches/gateway.yaml
  target:
    kind: Service
    name: gateway
    version: v1
- path: patches/image-pull-policy.yaml
  target:
    group: apps
    kind: Deployment
    version: v1

images:
- name: accounts
  newName: pullapp/accounts
  newTag: latest
- name: driver-tracker
  newName: pullapp/driver-tracker
  newTag: latest
- name: gateway
  newName: pullapp/gateway
  newTag: latest
- name: notifications
  newName: pullapp/notifications
  newTag: latest
- name: route-calc
  newName: pullapp/route-calc
  newTag: latest
- name: trip-planner
  newName: pullapp/trip-planner
  newTag: latest
