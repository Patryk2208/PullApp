mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.121.0"

replicaCount: 1

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false

config:
  extensions:
    health_check:
      endpoint: 0.0.0.0:13133

  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"
    jaeger: null
    zipkin: null
    prometheus: null

  processors:
    batch:
      timeout: 5s
    memory_limiter: null

  exporters:
    debug: null
    otlp/tempo:
      endpoint: tempo.monitoring.svc.cluster.local:4317
      tls:
        insecure: true
    prometheusremotewrite:
      endpoint: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write
      tls:
        insecure: true
    # natywny endpoint OTLP Loki — poprawnie obsługuje structured metadata
    # (w przeciwieństwie do przestarzałego eksportera `loki`), więc bez spamu
    # "negative structured metadata bytes" i z korelacją trace↔log
    otlphttp/loki:
      logs_endpoint: http://loki.monitoring.svc.cluster.local:3100/otlp/v1/logs

  service:
    telemetry:
      logs:
        level: info
    extensions: [health_check]
    pipelines:
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlp/tempo]
      metrics:
        receivers: [otlp]
        processors: [batch]
        exporters: [prometheusremotewrite]
      # serwisy mostkują logi Python/.NET → OTLP → collector; kierujemy je do Loki
      # natywnym OTLP (memory_limiter wyłączony powyżej, więc go nie referujemy)
      logs:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlphttp/loki]