deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

singleBinary:
  replicas: 1
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: "1"

# disable gateway — service is simply loki:3100
gateway:
  enabled: false

# disable distributed components
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# disable built-in Grafana agent / minio
minio:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# self-test canary: noisy (synthetic pushes + "negative structured metadata" /
# "unexpected entry" spam), not needed for our logging
lokiCanary:
  enabled: false
# the chart's helm-test depends on the canary, so disable it too
test:
  enabled: false
