grafana:
  adminPassword: pullapp-grafana

  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy

    - name: Tempo
      type: tempo
      url: http://tempo.monitoring.svc.cluster.local:3100
      access: proxy
      # single-binary Tempo serves queries over HTTP on :3100; Grafana's default
      # gRPC streaming would dial that HTTP port and fail ("looked like an
      # HTTP/1.1 header"), so disable streaming and use plain HTTP queries.
      jsonData:
        streamingEnabled:
          search: false

  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

alertmanager:
  enabled: false

prometheus:
  prometheusSpec:
    enableRemoteWriteReceiver: true
    retention: 3d
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 1Gi
        cpu: "1"

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: false
