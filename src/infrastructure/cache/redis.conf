# Memory
maxmemory 512mb
maxmemory-policy volatile-lru

# Persistence (AOF for production)
appendonly yes
appendfsync everysec

# Performance
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Security (basic)
# requirepass handled by docker-compose command

# Save to disk (RDB snapshots)
save 900 1
save 300 10
save 60 10000