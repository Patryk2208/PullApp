// ─── Inbound: Route-Calc → Trip Planner ─────────────────────────────────────

message ResultMessage {
    string job_id   = 1;
    string job_type = 2;
    bool   success  = 3;
    string error    = 4;   // "no_candidates" | "routing_error" | "timeout"

    oneof result {
        BestRouteResult best_route = 20;
        ClosestRoutesResult closest_routes = 21;
        RideMatchingResult ride_matching = 22;
    }
}

message DriverRouteResult {
    string route_geom_json  = 1;   // GeoJSON LineString serialised as string
    int32  eta_seconds      = 2;
    int32  distance_meters  = 3;
}

message MatchEntry {
    string driver_route_id             = 1;
    string driver_id                   = 2;
    int32  eta_to_passenger_seconds    = 3;
    int32  detour_meters               = 4;
    double score                       = 5;
}

message PassengerMatchResult {
    repeated MatchEntry matches = 1;
}

message RideMatchingResult {
    repeated MatchedRoute matches = 1;
}

message MatchedRoute {
    string route_id = 1;
    string driver_id = 2;
    double match_score = 3;  // 0.0 to 1.0, higher is better
    double detour_km = 4;  // How much longer than ideal passenger route
    int32 pickup_point_index = 5;  // Which index in driver route for pickup
    int32 dropoff_point_index = 6;  // Which index in driver route for dropoff
}

