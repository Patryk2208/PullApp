syntax = "proto3";

package core.v1;

//code generated with protoc

message ComputeMessage {
    string job_id = 1;
    string algorithm = 2; // "best_route", "closest_routes", "covering_route", "optimal_set"
    int64 created_at = 3; // Unix timestamp
    int32 retry_count = 4;
    
    oneof params {
        BestRouteParams best_route = 20;
        ClosestRoutesParams closest_routes = 21;
        //CoveringRouteParams covering_route = 22;
        //OptimalSetParams optimal_set = 23;
    }
}

message Point {
    double lat = 1;
    double lon = 2;
}

message BestRouteParams {
    Point start = 1;
    Point end = 2;
    string cost_type = 3; // "distance", "time", "scenic"
}

message ClosestRoutesParams {
    Point point = 1;
    int32 k = 2;
    double radius_meters = 3; // 0 = unlimited
}

