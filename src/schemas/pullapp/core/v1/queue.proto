syntax = "proto3";

package core.v1;

//code generated with protoc

message ComputeMessage {
    string job_id = 1;
    string algorithm = 2; // "best_route", "closest_routes", "ride_matching", "covering_route", "optimal_set"
    int64 created_at = 3; // Unix timestamp
    int32 retry_count = 4;

    oneof params {
        BestRouteParams best_route = 20;
        ClosestRoutesParams closest_routes = 21;
        RideMatchingQuery ride_matching = 22;
        //CoveringRouteParams covering_route = 23;
        //OptimalSetParams optimal_set = 24;
    }
}

message Point {
    double lat = 1;
    double lon = 2;
}

message BestRouteParams {
    Point start = 1;
    Point end = 2;
    string cost_type = 3; // "distance", "time", "scenic"
}

message ClosestRoutesParams {
    Point point = 1;
    int32 k = 2;
    double radius_meters = 3; // 0 = unlimited
}

message RideMatchingQuery {
    string passenger_id = 1;
    Point start = 2;  // Where passenger wants to start
    Point end = 3;    // Where passenger wants to end
    int64 departure_date = 4;  // Unix timestamp (date only)
    int32 seats_needed = 5;
    // Available driver routes to search through
    repeated DriverRoute candidate_routes = 6;
    // Matching parameters
    int32 max_detour_km = 7;  // Don't match if detour is larger
    int32 time_window_minutes = 8;  // Acceptable time difference from departure_date
}

message DriverRoute {
    string route_id = 1;
    string driver_id = 2;
    repeated Point route_points = 3;  // The actual road path (list of coordinates)
    int64 departure_date = 4;  // Unix timestamp
    int32 departure_time_minutes = 5;  // Minutes since midnight
    int32 seats_available = 6;
    double estimated_duration_hours = 7;
}

