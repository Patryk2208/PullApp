[pytest]
asyncio_mode = auto
pythonpath = .
markers =
    gateway: gateway connectivity and routing tests (no upstream state required)
    cluster: tests that target the full cluster through the gateway
    flow: multi-service flow tests
    requires_route_calc: tests that need route-calc running and consuming from RabbitMQ
    requires_accounts: tests that need the accounts service deployed
    dirty: test suite not yet validated against current cluster routing; excluded from default runs
