services:
  
  accounts-api:
    build:
      context: ./src/services/Accounts
      dockerfile: infra/docker/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development # TODO
      - ConnectionStrings__DefaultConnection=Host=accounts-db;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    depends_on:
      - accounts-db
    networks:
      - pullapp-net

  accounts-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - pullapp-net

networks:
  pullapp-net:
    driver: bridge
