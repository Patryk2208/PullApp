name: CI — route-calc

on:
  push:
    branches: [master, develop]
    paths:
      - 'src/services/route-calc/**'
      - 'src/schemas/**'
      - '.github/workflows/route-calc-ci.yaml'
  pull_request:
    branches: [master, develop]
    paths:
      - 'src/services/route-calc/**'
      - 'src/schemas/**'
      - '.github/workflows/route-calc-ci.yaml'

env:
  COMMIT_SHA: ${{ github.sha }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/services/route-calc

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler cmake build-essential libcurl4-openssl-dev

      - name: Generate protobufs
        run: |
          mkdir -p route_calc/generated
          protoc \
            --proto_path=../../schemas/pullapp/core/v1/ \
            --python_out=route_calc/generated/ \
            ../../schemas/pullapp/core/v1/queue.proto
          touch route_calc/generated/__init__.py

      - name: Install Poetry
        run: pip install poetry

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: src/services/route-calc/.venv
          key: poetry-${{ runner.os }}-${{ hashFiles('src/services/route-calc/poetry.lock') }}
          restore-keys: poetry-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Build C++ extension
        run: poetry run pip install -e .

      - name: Run tests
        run: poetry run pytest tests/db_test.py -v
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"

  dockerize:
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: src/services/route-calc

    steps:
      - uses: actions/checkout@v4

      - name: Docker build
        run: docker build -f Dockerfile -t pullapp/route-calc:${{ env.COMMIT_SHA }} .