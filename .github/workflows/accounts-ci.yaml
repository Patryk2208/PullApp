name: CI — accounts

on:
  push:
    branches: [master, develop]
    paths:
      - 'src/services/accounts/**'
      - '.github/workflows/accounts-ci.yaml'
  pull_request:
    branches: [master, develop]
    paths:
      - 'src/services/accounts/**'
      - '.github/workflows/accounts-ci.yaml'

env:
  COMMIT_SHA: ${{ github.sha }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/services/accounts

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-accounts-${{ hashFiles('src/services/accounts/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-accounts-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: |
          dotnet test \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=unit-test-results.trx" \
            --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accounts-test-results
          path: src/services/accounts/TestResults/*.trx

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accounts-coverage
          path: src/services/accounts/TestResults/**/coverage.cobertura.xml

  dockerize:
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: src/services/accounts

    steps:
      - uses: actions/checkout@v4

      - name: Docker build
        run: docker build -f Dockerfile -t pullapp/accounts:${{ env.COMMIT_SHA }} .
