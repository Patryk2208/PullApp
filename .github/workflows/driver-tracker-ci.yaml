name: CI — driver-tracker

on:
  push:
    branches: [master, develop]
    paths:
      - 'src/services/driver-tracker/**'
      - '.github/workflows/driver-tracker-ci.yaml'
  pull_request:
    branches: [master, develop]
    paths:
      - 'src/services/driver-tracker/**'
      - '.github/workflows/driver-tracker-ci.yaml'

env:
  COMMIT_SHA: ${{ github.sha }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/services/driver-tracker

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/services/driver-tracker/go.mod
          cache-dependency-path: src/services/driver-tracker/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests (race)
        run: go test -race ./...

  integration-test:
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: src/services/driver-tracker

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/services/driver-tracker/go.mod
          cache-dependency-path: src/services/driver-tracker/go.sum

      - name: Integration tests
        run: go test -tags=integration -timeout 10m ./...

  dockerize:
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: src/services/driver-tracker

    steps:
      - uses: actions/checkout@v4

      - name: Docker build
        run: docker build -f Dockerfile -t pullapp/driver-tracker:${{ env.COMMIT_SHA }} .