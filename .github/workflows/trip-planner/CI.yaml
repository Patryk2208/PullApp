name: CI pipeline for trip-planner service

# We only want to run this CI pipeline for changes to the trip-planner service
on:
  push:
    branches: [ master ]
    #paths:
      #- 'src/trip-planner/**'
      #- '.github/workflows/trip-planner/**'
  pull_request:
    paths:
      - src/trip-planner/**'

env:
  BUILD_ID: ${{ github.run_id }}-${{ github.run_number }}
  COMMIT_SHA: ${{ github.sha }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/trip-planner
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0

      - name: Cache packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test tests/TripPlanner.UnitTests \
            --configuration Release \
            --logger "trx;LogFileName=test-results/unit-test-results.trx" \ 
            --collect:"XPlat Code Coverage" \
            /p:CoverletOutputFormat=cobertura \
            /p:CoverletOutput=test-results/coverage.cobertura.xml


      - name: Upload test results
        uses: actions/upload-artifact@v4  
        with:
          name: trip-planner-unit-test-results
          path: test-results/*.trx
      
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: trip-planner-coverage
          path: test-results/coverage.cobertura.xml
  dockerize:
    needs: build-and-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/trip-planner
    steps:
      - run: docker build -f infra/docker/Dockerfile -t ${{ env.COMMIT_SHA }} .
      
        
      
