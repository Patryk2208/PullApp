name: CI — gateway

on:
  push:
    branches: [master]
    paths:
      - 'src/services/gateway/**'
      - '.github/workflows/gateway-ci.yaml'
  pull_request:
    paths:
      - 'src/services/gateway/**'
      - '.github/workflows/gateway-ci.yaml'

env:
  COMMIT_SHA: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/services/gateway

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-gateway-${{ hashFiles('src/services/gateway/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-gateway-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

  dockerize:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: src/services/gateway

    steps:
      - uses: actions/checkout@v4

      - name: Docker build
        run: docker build -f Dockerfile -t pullapp/gateway:${{ env.COMMIT_SHA }} .
