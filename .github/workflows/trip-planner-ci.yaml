name: CI — trip-planner

on:
  push:
    branches: [master, develop]
    paths:
      - 'src/services/trip-planner/**'
      - '.github/workflows/trip-planner-ci.yaml'
  pull_request:
    branches: [master, develop]
    paths:
      - 'src/services/trip-planner/**'
      - '.github/workflows/trip-planner-ci.yaml'

env:
  COMMIT_SHA: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/services/trip-planner

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-trip-planner-${{ hashFiles('src/services/trip-planner/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-trip-planner-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

  test:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: src/services/trip-planner

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-trip-planner-${{ hashFiles('src/services/trip-planner/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-trip-planner-

      - name: Restore
        run: dotnet restore

      - name: Unit tests
        run: dotnet test tests/TripPlanner.UnitTests --no-restore --configuration Release

      - name: Integration tests
        run: dotnet test tests/TripPlanner.IntegrationTests --no-restore --configuration Release

  dockerize:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: src/services/trip-planner

    steps:
      - uses: actions/checkout@v4

      - name: Docker build
        # trip-planner's Dockerfile COPYs cross-service paths (services/trip-planner/...
        # and schemas/...), so it must build from the src/ root, not the service dir.
        working-directory: src
        run: docker build -f services/trip-planner/Dockerfile -t pullapp/trip-planner:${{ env.COMMIT_SHA }} .
